# Указываем версию файла
version: '3.8'

# Создаем сетб
networks:
  # Указываем наименование сети
  backend-application:
    # Указываем тип сети
    driver: bridge

# Создаем контейнеры
services:
  api-gateway:
    # Путь к папке, где лежит Dockerfile
    build: ./api-gateway
    # Имя контейнера
    container_name: apigateway
    env_file:
      - .env
    # Пробрасываем порт
    ports:
      - "8080:80"
    # Синхронизация кода
    volumes:
      - ./api-gateway:/app
    networks:
      - backend-application

  post-microservice:
    # Путь к папке, где лежит Dockerfile
    build: ./post-microservice
    # Имя контейнера
    container_name: post-microservice
    env_file:
      - .env
    # Пробрасываем порт
    ports:
      - "8083:81"
    # Синхронизация кода
    volumes:
      - ./post-microservice:/app
    networks:
      - backend-application

  user-microservice:
    build: ./user-microservice
    container_name: user-microservice
    env_file:
      - .env
    ports:
      - "8081:81"
    volumes:
      - ./user-microservice:/app
    networks:
      - backend-application

  account-microservice:
    build: ./account-microservice
    container_name: account-microservice
    env_file:
      - .env
    ports:
      - "8084:81"
    volumes:
      - ./account-microservice:/app
    networks:
      - backend-application

  room-microservice:
    build: ./room-microservice
    container_name: room-microservice
    ports:
      - "8082:81"
    volumes:
      - ./room-microservice:/app
    networks:
      - backend-application

  postgresql-users:
    image: postgres:18.2-alpine3.23
    container_name: postgresql-users
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
      POSTGRES_DB: db_users
    ports:
      - "5434:5432"
    volumes:
      - ./postgresql-users:/var/lib/postgresql
    networks:
      - backend-application

  postgresql-accounts:
    image: postgres:18.2-alpine3.23
    container_name: postgresql-accounts
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
      POSTGRES_DB: db_accounts
    ports:
      - "5435:5432"
    volumes:
      - ./postgresql-accounts:/var/lib/postgresql
    networks:
      - backend-application


  postgresql-rooms:
    image: postgres:18.2-alpine3.23
    container_name: postgresql-rooms
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
      POSTGRES_DB: db_rooms
    ports:
      - "5433:5432"
    volumes:
      - ./postgresql-rooms:/var/lib/postgresql
    networks:
      - backend-application

  postgresql-posts:
    image: postgres:18.2-alpine3.23
    container_name: postgresql-posts
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
      POSTGRES_DB: db_posts
    ports:
      - "5436:5432"
    volumes:
      - ./postgresql-posts:/var/lib/postgresql
    networks:
      - backend-application

  checking-content-microservice:
    build: ./content-checking-microservice
    # container_name: checking-content-microservice
    # ports:
    #   - "8084:8000"
    volumes:
    - ./content-checking-microservice:/app
    networks:
      - backend-application
    deploy:           
      resources:      
        limits:       
          cpus: '3'  # Ограничение: не более 300% (3 ядер)
          memory: 2G   # Ограничение: не более 2 ГБ оперативной памяти


  redis-queue:
    image: redis:8.6.0-alpine3.23
    container_name: redis-queue
    ports:
      - "6380:6379"
    networks:
    - backend-application
    

  redis-otp-code:
    image: redis:8.6.0-alpine3.23
    container_name: redis-otp-code
    ports:
      - "6379:6379"
    networks:
      - backend-application

